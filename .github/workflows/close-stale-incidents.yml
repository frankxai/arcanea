name: Close Stale Incident Issues

# Manual trigger only — run once to clean up, then delete this workflow
on:
  workflow_dispatch:

jobs:
  close-incidents:
    name: Close Auto-Generated Incident Issues
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Close all incident-labeled issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident',
              per_page: 100,
            });

            console.log(`Found ${issues.length} open incident issues`);

            for (const issue of issues) {
              // Only close auto-generated deployment incident issues
              if (issue.title.includes('Production Deployment Failed')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: 'Closing stale auto-generated incident. The workflow that created these has been fixed to use step summaries instead of issues.',
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });

                console.log(`Closed #${issue.number}: ${issue.title}`);
              }
            }

            echo_summary = `Closed ${issues.filter(i => i.title.includes('Production Deployment Failed')).length} stale incident issues`;
            console.log(echo_summary);
